name: CI

# Lint + build gate for the marketing site. Vercel already fails a deploy on a
# broken build, but this catches lint/build errors on the PR before merge.
# No secrets needed: env is read at request-time (email send), and the rest
# have in-code fallbacks, so `next build` runs clean without Doppler/Vercel env.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Only the latest push on a PR needs to pass; never cancel main runs.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build
